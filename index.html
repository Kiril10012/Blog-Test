<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Meine Pinnwand</title>
    <style>
        /* Dein gesamtes CSS kommt hier rein */
        body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background: #f4f4f9; }
        .pinnwand { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .eintrag { border-bottom: 1px solid #ddd; padding: 10px 0; }
        .name { font-weight: bold; color: #2c3e50; }
        .zeit { font-size: 0.8em; color: #7f8c8d; }
        form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input, textarea, button { padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #3498db; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="pinnwand">
        <h1>📌 Pinnwand</h1>
        
        <!-- FORMULAR zum Schreiben -->
        <form id="pinnwandForm">
            <input type="text" id="nameInput" placeholder="Dein Name (optional)" />
            <textarea id="nachrichtInput" placeholder="Deine Nachricht..." required></textarea>
            <button type="submit">📨 Abschicken</button>
        </form>

        <!-- Bereich für die Einträge -->
        <div id="eintraegeContainer">
            <p>Lade Nachrichten...</p>
        </div>
    </div>

    <script>
        // --- HIER KOMMT DEINE APP-SCRIPT-URL REIN (aus Schritt 2) ---
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxwS25PFhCSFJqYIHAZVPwm0pc_3Hv0HNXm6ESVXYl6oPrDDMpp7gOkjvH_WYFxETeP/exec';

        // 1. Funktion: Alle Einträge laden und anzeigen
        async function ladeEintraege() {
            const container = document.getElementById('eintraegeContainer');
            try {
                const response = await fetch(SCRIPT_URL);
                if (!response.ok) throw new Error('Netzwerkfehler');
                const eintraege = await response.json();

                if (eintraege.length === 0) {
                    container.innerHTML = '<p>Noch keine Einträge. Schreib was! 😊</p>';
                    return;
                }

                // Einträge rückwärts anzeigen (neueste zuerst)
                container.innerHTML = eintraege.reverse().map(e => `
                    <div class="eintrag">
                        <div class="name">${e.Name || 'Anonym'}</div>
                        <div class="zeit">${e.Zeitstempel ? new Date(e.Zeitstempel).toLocaleString() : ''}</div>
                        <p>${e.Nachricht}</p>
                    </div>
                `).join('');
            } catch (error) {
                container.innerHTML = `<p style="color:red;">Fehler beim Laden: ${error.message}</p>`;
            }
        }

        // 2. Funktion: Neuen Eintrag abschicken
        document.getElementById('pinnwandForm').addEventListener('submit', async (event) => {
            event.preventDefault();

            const name = document.getElementById('nameInput').value.trim();
            const message = document.getElementById('nachrichtInput').value.trim();

            if (!message) {
                alert('Bitte schreib eine Nachricht!');
                return;
            }

            const button = event.target.querySelector('button');
            button.disabled = true;
            button.textContent = 'Sende...';

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Wichtig für Google Apps Script!
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, message: message })
                });

                // Achtung: Wegen 'no-cors' bekommen wir keine Antwort. 
                // Wir gehen einfach davon aus, dass es geklappt hat.
                document.getElementById('nameInput').value = '';
                document.getElementById('nachrichtInput').value = '';
                alert('✅ Nachricht gesendet! Seite wird neu geladen...');
                location.reload(); // Lädt die Seite neu und zeigt den neuen Eintrag

            } catch (error) {
                alert('❌ Fehler beim Senden: ' + error.message);
            } finally {
                button.disabled = false;
                button.textContent = '📨 Abschicken';
            }
        });

        // Beim Laden der Seite: Einträge holen
        ladeEintraege();
    </script>
</body>
</html>
