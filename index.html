<!DOCTYPE html>
<html>
<head>
    <title>Broski's Pin-Blog</title>
    <style>
        /* All dein CSS hier */
        body { font-family: monospace; max-width: 600px; margin: 50px auto; background: #0d0d0d; color: #00ff41; }
        .post { background: #1a1a1a; padding: 20px; margin: 10px 0; border-left: 3px solid #00ff41; }
        .pinned { border-left: 3px solid #ff00ff; background: #2a1a2a; }
        button { background: #00ff41; color: #0d0d0d; border: none; padding: 10px 20px; cursor: pointer; }
        input, textarea { width: 100%; background: #1a1a1a; color: #00ff41; border: 1px solid #00ff41; padding: 10px; }
    </style>
</head>
<body>
    <h1>📌 Broski's Pinnwand</h1>
    
    <!-- Formular zum Posten -->
    <div>
        <input id="titleInput" placeholder="Titel" /><br><br>
        <textarea id="contentInput" placeholder="Dein Text..." rows="3"></textarea><br>
        <button onclick="addPost()">📝 Post abschicken</button>
    </div>

    <hr>

    <!-- Hier werden die Posts angezeigt -->
    <div id="postsContainer"></div>

    <script>
        // ==========================================
        // DAS IST DEIN "BACKEND" - Alles in einer Datei!
        // ==========================================

        // 1. Daten aus dem Browser-Speicher laden
        function getPosts() {
            const data = localStorage.getItem('blogPosts');
            return data ? JSON.parse(data) : [];
        }

        // 2. Daten in den Browser-Speicher schreiben
        function savePosts(posts) {
            localStorage.setItem('blogPosts', JSON.stringify(posts));
        }

        // 3. Neuen Post hinzufügen
        function addPost() {
            const title = document.getElementById('titleInput').value;
            const content = document.getElementById('contentInput').value;
            
            if (!title || !content) {
                alert('Brudi, Titel und Text müssen gefüllt sein!');
                return;
            }

            const posts = getPosts();
            const newPost = {
                id: Date.now(),
                title: title,
                content: content,
                pinned: false,
                date: new Date().toLocaleDateString()
            };
            
            posts.push(newPost);
            savePosts(posts);
            
            // Inputs leeren
            document.getElementById('titleInput').value = '';
            document.getElementById('contentInput').value = '';
            
            renderPosts(); // Seite neu zeichnen
        }

        // 4. Post anpinnen (DAS IST DEIN HIGHLIGHT!)
        function togglePin(id) {
            const posts = getPosts();
            
            // Erst alle auf unpinned setzen (nur einer darf pinned sein)
            posts.forEach(p => p.pinned = false);
            
            // Dann den richtigen pinned setzen
            const post = posts.find(p => p.id === id);
            if (post) {
                post.pinned = true;
                savePosts(posts);
                renderPosts();
            }
        }

        // 5. Post löschen
        function deletePost(id) {
            if (!confirm('Wirklich löschen?')) return;
            let posts = getPosts();
            posts = posts.filter(p => p.id !== id);
            savePosts(posts);
            renderPosts();
        }

        // 6. Posts auf dem Bildschirm anzeigen
        function renderPosts() {
            const container = document.getElementById('postsContainer');
            const posts = getPosts();
            
            // Sortieren: Gepinnte zuerst
            posts.sort((a, b) => (a.pinned === b.pinned) ? 0 : a.pinned ? -1 : 1);
            
            if (posts.length === 0) {
                container.innerHTML = '<p>Noch keine Posts. Schreib was!</p>';
                return;
            }

            container.innerHTML = posts.map(post => `
                <div class="post ${post.pinned ? 'pinned' : ''}">
                    ${post.pinned ? '📌 ' : ''}
                    <strong>${post.title}</strong> 
                    <small>(${post.date})</small>
                    <p>${post.content}</p>
                    <button onclick="togglePin(${post.id})">${post.pinned ? '📌 Entpinnen' : '📌 Anpinnen'}</button>
                    <button onclick="deletePost(${post.id})" style="background:#ff0044;">🗑️ Löschen</button>
                </div>
            `).join('');
        }

        // 7. Seite beim Laden initialisieren
        renderPosts();

        // 8. Bonus: Tastenkürzel (Enter zum Abschicken)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                addPost();
            }
        });

        console.log('🚀 Broski-Blog läuft! Alles gespeichert in deinem Browser!');
    </script>
</body>
</html>
